<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="a8bg" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#162a4a"/><stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#a8bg)" rx="8"/>
  <circle cx="250" cy="200" r="150" fill="#c8a45a" opacity="0.04"/>
  <!-- K9 / Dog patrol -->
  <g transform="translate(250,140)" fill="#c8a45a" opacity="0.25">
    <!-- Handler -->
    <circle cx="-40" cy="-20" r="18"/>
    <path d="M-58 5 L-62 110 L-45 110 L-40 60 L-35 110 L-18 110 L-22 5Z"/>
    <path d="M-22 10 L0 30 L-3 36 L-25 20Z"/>
    <!-- Leash -->
    <path d="M0 30 Q30 50 55 40" stroke="#c8a45a" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Dog silhouette -->
    <g transform="translate(55,25)">
      <!-- Body -->
      <ellipse cx="20" cy="10" rx="35" ry="18"/>
      <!-- Head -->
      <ellipse cx="-18" cy="-5" rx="14" ry="12"/>
      <!-- Snout -->
      <ellipse cx="-32" cy="-2" rx="8" ry="6"/>
      <!-- Ear -->
      <polygon points="-12,-15 -8,-28 -2,-12"/>
      <!-- Tail -->
      <path d="M55 0 Q65,-20 60,-30" stroke="#c8a45a" stroke-width="3" fill="none"/>
      <!-- Legs -->
      <rect x="-5" y="22" width="6" height="28" rx="2"/>
      <rect x="8" y="22" width="6" height="28" rx="2"/>
      <rect x="32" y="22" width="6" height="28" rx="2"/>
      <rect x="42" y="22" width="6" height="28" rx="2"/>
    </g>
  </g>
  <!-- Paw prints -->
  <g fill="#c8a45a" opacity="0.08">
    <g transform="translate(350,320)">
      <circle cx="0" cy="0" r="6"/><circle cx="-8" cy="-10" r="3.5"/><circle cx="0" cy="-13" r="3.5"/><circle cx="8" cy="-10" r="3.5"/>
    </g>
    <g transform="translate(380,280)">
      <circle cx="0" cy="0" r="5"/><circle cx="-7" cy="-8" r="3"/><circle cx="0" cy="-11" r="3"/><circle cx="7" cy="-8" r="3"/>
    </g>
    <g transform="translate(120,310)">
      <circle cx="0" cy="0" r="5.5"/><circle cx="-7" cy="-9" r="3.2"/><circle cx="0" cy="-12" r="3.2"/><circle cx="7" cy="-9" r="3.2"/>
    </g>
  </g>
  <text x="250" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#c8a45a" letter-spacing="3">TUẦN TRA CÙNG CHÓ</text>
  <text x="250" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#c8a45a" opacity="0.4" letter-spacing="2">ALBUM HOẠT ĐỘNG</text>
</svg>