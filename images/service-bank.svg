<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/><stop offset="100%" style="stop-color:#162a4a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bbg)" rx="8"/>
  <circle cx="200" cy="110" r="110" fill="#c8a45a" opacity="0.04"/>
  <!-- Bank building -->
  <g transform="translate(200,40)" stroke="#c8a45a" fill="none" stroke-width="2">
    <!-- Pediment (triangle roof) -->
    <polygon points="-80,45 0,5 80,45" fill="#c8a45a" opacity="0.08" stroke-width="2.5"/>
    <!-- Roof line -->
    <line x1="-90" y1="45" x2="90" y2="45" stroke-width="3"/>
    <!-- Columns -->
    <g stroke-width="2.5">
      <line x1="-60" y1="48" x2="-60" y2="140"/>
      <line x1="-25" y1="48" x2="-25" y2="140"/>
      <line x1="25" y1="48" x2="25" y2="140"/>
      <line x1="60" y1="48" x2="60" y2="140"/>
    </g>
    <!-- Column bases -->
    <g stroke-width="1.5" opacity="0.6">
      <rect x="-67" y="137" width="14" height="6" rx="1"/>
      <rect x="-32" y="137" width="14" height="6" rx="1"/>
      <rect x="18" y="137" width="14" height="6" rx="1"/>
      <rect x="53" y="137" width="14" height="6" rx="1"/>
    </g>
    <!-- Column capitals -->
    <g stroke-width="1.5" opacity="0.6">
      <rect x="-67" y="46" width="14" height="5" rx="1"/>
      <rect x="-32" y="46" width="14" height="5" rx="1"/>
      <rect x="18" y="46" width="14" height="5" rx="1"/>
      <rect x="53" y="46" width="14" height="5" rx="1"/>
    </g>
    <!-- Base -->
    <rect x="-85" y="140" width="170" height="10" fill="#c8a45a" opacity="0.1" stroke-width="2"/>
    <!-- Steps -->
    <line x1="-90" y1="153" x2="90" y2="153" stroke-width="1.5" opacity="0.5"/>
    <line x1="-95" y1="160" x2="95" y2="160" stroke-width="1.5" opacity="0.4"/>
    <!-- Dollar/VND symbol in center -->
    <g transform="translate(0,90)" opacity="0.3">
      <circle cx="0" cy="0" r="20" stroke-width="2" fill="#c8a45a" opacity="0.1"/>
      <text x="0" y="7" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#c8a45a" stroke="none">$</text>
    </g>
  </g>
  <text x="200" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#c8a45a" letter-spacing="3">BẢO VỆ NGÂN HÀNG</text>
  <text x="200" y="265" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#c8a45a" opacity="0.5" letter-spacing="2">TÀI CHÍNH - KHO QUỸ</text>
  <line x1="95" y1="252" x2="150" y2="252" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <line x1="250" y1="252" x2="305" y2="252" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
</svg>