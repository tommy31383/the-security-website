<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="abg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#162a4a"/>
    </linearGradient>
    <linearGradient id="agold1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c86a"/>
      <stop offset="100%" style="stop-color:#a8843a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#abg1)" rx="8"/>
  <!-- Subtle radial glow -->
  <circle cx="300" cy="180" r="200" fill="#c8a45a" opacity="0.05"/>
  <!-- Guard silhouette -->
  <g transform="translate(300,80)" fill="#c8a45a" opacity="0.35">
    <!-- Head with cap -->
    <ellipse cx="0" cy="0" rx="28" ry="30"/>
    <rect x="-35" y="-18" width="70" height="10" rx="3"/>
    <rect x="-28" y="-28" width="56" height="12" rx="2"/>
    <!-- Body -->
    <path d="M-35 40 L-45 200 L-15 200 L-5 120 L0 100 L5 120 L15 200 L45 200 L35 40 C35 35 20 30 0 30 C-20 30 -35 35 -35 40Z"/>
    <!-- Belt -->
    <rect x="-38" y="85" width="76" height="8" rx="2" fill="#0a1628" opacity="0.3"/>
    <rect x="-5" y="83" width="10" height="12" rx="2" fill="#c8a45a" opacity="0.5"/>
    <!-- Shoulders/epaulettes -->
    <rect x="-42" y="38" width="18" height="6" rx="2" fill="#c8a45a" opacity="0.5"/>
    <rect x="24" y="38" width="18" height="6" rx="2" fill="#c8a45a" opacity="0.5"/>
    <!-- Badge -->
    <path d="M-8 55 L0 48 L8 55 L5 65 L-5 65Z" fill="#c8a45a" opacity="0.6"/>
  </g>
  <!-- Stars decoration -->
  <g fill="#c8a45a" opacity="0.3">
    <polygon points="100,60 103,70 113,70 105,76 108,86 100,80 92,86 95,76 87,70 97,70" transform="scale(0.7)"/>
    <polygon points="500,50 503,60 513,60 505,66 508,76 500,70 492,76 495,66 487,60 497,60" transform="scale(0.6)"/>
  </g>
  <!-- Text -->
  <text x="300" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#c8a45a" letter-spacing="4">ĐỘI NGŨ CHUYÊN NGHIỆP</text>
  <text x="300" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#c8a45a" opacity="0.5" letter-spacing="2">KINH NGHIỆM - KỶ LUẬT</text>
  <line x1="150" y1="355" x2="220" y2="355" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <line x1="380" y1="355" x2="450" y2="355" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
</svg>