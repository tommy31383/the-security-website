<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="a2bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#152848"/><stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#a2bg)" rx="8"/>
  <circle cx="250" cy="200" r="160" fill="#c8a45a" opacity="0.04"/>
  <!-- Patrol car top view -->
  <g transform="translate(250,180)" stroke="#c8a45a" stroke-width="2" fill="none">
    <rect x="-60" y="-35" width="120" height="70" rx="20" fill="#c8a45a" opacity="0.08"/>
    <rect x="-45" y="-25" width="90" height="50" rx="10" opacity="0.4"/>
    <!-- Lights on top -->
    <rect x="-15" y="-40" width="30" height="10" rx="4" fill="#c8a45a" opacity="0.2"/>
    <circle cx="-5" cy="-35" r="3" fill="#c8a45a" opacity="0.4"/>
    <circle cx="5" cy="-35" r="3" fill="#c8a45a" opacity="0.4"/>
    <!-- Wheels -->
    <ellipse cx="-50" cy="-30" rx="8" ry="5" fill="#c8a45a" opacity="0.15"/>
    <ellipse cx="50" cy="-30" rx="8" ry="5" fill="#c8a45a" opacity="0.15"/>
    <ellipse cx="-50" cy="30" rx="8" ry="5" fill="#c8a45a" opacity="0.15"/>
    <ellipse cx="50" cy="30" rx="8" ry="5" fill="#c8a45a" opacity="0.15"/>
    <!-- Security text on car -->
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c8a45a" opacity="0.3" stroke="none">SECURITY</text>
  </g>
  <!-- Road lines -->
  <g stroke="#c8a45a" stroke-width="2" opacity="0.1" stroke-dasharray="15,10">
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
  </g>
  <text x="250" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#c8a45a" letter-spacing="3">TUẦN TRA</text>
  <text x="250" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#c8a45a" opacity="0.4" letter-spacing="2">ALBUM HOẠT ĐỘNG</text>
</svg>