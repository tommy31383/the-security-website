<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="a7bg" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#0a1628"/><stop offset="50%" style="stop-color:#152848"/><stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#a7bg)" rx="8"/>
  <circle cx="250" cy="200" r="150" fill="#c8a45a" opacity="0.04"/>
  <!-- Handshake / ceremony -->
  <g transform="translate(250,170)" stroke="#c8a45a" stroke-width="2.5" fill="none">
    <!-- Left hand -->
    <path d="M-90,20 L-50,0 L-20,10 L0,0" opacity="0.4"/>
    <path d="M-90,20 L-85,30 L-50,12 L-20,22 L0,12" opacity="0.4"/>
    <!-- Right hand -->
    <path d="M90,20 L50,0 L20,10 L0,0" opacity="0.4"/>
    <path d="M90,20 L85,30 L50,12 L20,22 L0,12" opacity="0.4"/>
    <!-- Handshake center -->
    <ellipse cx="0" cy="6" rx="18" ry="14" fill="#c8a45a" opacity="0.1"/>
    <!-- Certificate / award -->
    <g transform="translate(0,-70)" opacity="0.3">
      <rect x="-35" y="-25" width="70" height="50" rx="4" fill="#c8a45a" opacity="0.1"/>
      <line x1="-20" y1="-10" x2="20" y2="-10" stroke-width="1.5"/>
      <line x1="-15" y1="0" x2="15" y2="0" stroke-width="1"/>
      <line x1="-18" y1="8" x2="18" y2="8" stroke-width="1"/>
      <!-- Seal -->
      <circle cx="0" cy="25" r="10" fill="#c8a45a" opacity="0.15"/>
      <path d="M0 35 L-5 50 L0 45 L5 50Z" fill="#c8a45a" opacity="0.15" stroke="none"/>
    </g>
  </g>
  <!-- Laurel wreath sides -->
  <g transform="translate(250,200)" stroke="#c8a45a" stroke-width="1.5" fill="none" opacity="0.12">
    <path d="M-100,-50 C-90,-30 -85,0 -85,30 C-85,50 -90,70 -100,80"/>
    <path d="M-95,-40 C-85,-20 -80,10 -80,35"/>
    <path d="M100,-50 C90,-30 85,0 85,30 C85,50 90,70 100,80"/>
    <path d="M95,-40 C85,-20 80,10 80,35"/>
  </g>
  <text x="250" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#c8a45a" letter-spacing="3">LỄ TRAO THƯỞNG</text>
  <text x="250" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#c8a45a" opacity="0.4" letter-spacing="2">ALBUM HOẠT ĐỘNG</text>
</svg>