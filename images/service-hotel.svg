<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#152848"/><stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#hbg)" rx="8"/>
  <circle cx="200" cy="110" r="110" fill="#c8a45a" opacity="0.04"/>
  <!-- Hotel building -->
  <g transform="translate(200,25)" stroke="#c8a45a" fill="none" stroke-width="2">
    <!-- Main tower -->
    <rect x="-45" y="15" width="90" height="150" fill="#c8a45a" opacity="0.1"/>
    <!-- Left wing -->
    <rect x="-85" y="55" width="42" height="110" fill="#c8a45a" opacity="0.07"/>
    <!-- Right wing -->
    <rect x="43" y="55" width="42" height="110" fill="#c8a45a" opacity="0.07"/>
    <!-- Rooftop -->
    <rect x="-50" y="10" width="100" height="8" rx="2" fill="#c8a45a" opacity="0.15"/>
    <!-- Sign on top -->
    <rect x="-20" y="-5" width="40" height="18" rx="3" fill="#c8a45a" opacity="0.12"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c8a45a" opacity="0.5" stroke="none">HOTEL</text>
    <!-- Windows - main tower -->
    <g stroke-width="1.2" opacity="0.45">
      <rect x="-32" y="25" width="12" height="10" rx="1"/><rect x="-7" y="25" width="12" height="10" rx="1"/><rect x="18" y="25" width="12" height="10" rx="1"/>
      <rect x="-32" y="42" width="12" height="10" rx="1"/><rect x="-7" y="42" width="12" height="10" rx="1"/><rect x="18" y="42" width="12" height="10" rx="1"/>
      <rect x="-32" y="59" width="12" height="10" rx="1"/><rect x="-7" y="59" width="12" height="10" rx="1"/><rect x="18" y="59" width="12" height="10" rx="1"/>
      <rect x="-32" y="76" width="12" height="10" rx="1"/><rect x="-7" y="76" width="12" height="10" rx="1"/><rect x="18" y="76" width="12" height="10" rx="1"/>
      <rect x="-32" y="93" width="12" height="10" rx="1"/><rect x="-7" y="93" width="12" height="10" rx="1"/><rect x="18" y="93" width="12" height="10" rx="1"/>
      <rect x="-32" y="110" width="12" height="10" rx="1"/><rect x="-7" y="110" width="12" height="10" rx="1"/><rect x="18" y="110" width="12" height="10" rx="1"/>
    </g>
    <!-- Windows - wings -->
    <g stroke-width="1" opacity="0.35">
      <rect x="-76" y="65" width="10" height="8" rx="1"/><rect x="-60" y="65" width="10" height="8" rx="1"/>
      <rect x="-76" y="80" width="10" height="8" rx="1"/><rect x="-60" y="80" width="10" height="8" rx="1"/>
      <rect x="-76" y="95" width="10" height="8" rx="1"/><rect x="-60" y="95" width="10" height="8" rx="1"/>
      <rect x="-76" y="110" width="10" height="8" rx="1"/><rect x="-60" y="110" width="10" height="8" rx="1"/>
      <rect x="50" y="65" width="10" height="8" rx="1"/><rect x="66" y="65" width="10" height="8" rx="1"/>
      <rect x="50" y="80" width="10" height="8" rx="1"/><rect x="66" y="80" width="10" height="8" rx="1"/>
      <rect x="50" y="95" width="10" height="8" rx="1"/><rect x="66" y="95" width="10" height="8" rx="1"/>
      <rect x="50" y="110" width="10" height="8" rx="1"/><rect x="66" y="110" width="10" height="8" rx="1"/>
    </g>
    <!-- Entrance -->
    <rect x="-15" y="135" width="30" height="30" rx="3" fill="#c8a45a" opacity="0.15" stroke-width="2"/>
    <!-- Canopy -->
    <path d="M-25 135 L-35 128 L35 128 L25 135" stroke-width="1.5" fill="#c8a45a" opacity="0.1"/>
    <!-- Star rating -->
    <g transform="translate(0,-18)" fill="#c8a45a" opacity="0.35" stroke="none">
      <polygon points="-16,0 -14.5,-4 -10.5,-4 -13.5,-7 -12.5,-11 -16,-9 -19.5,-11 -18.5,-7 -21.5,-4 -17.5,-4" transform="scale(0.5)"/>
      <polygon points="0,0 1.5,-4 5.5,-4 2.5,-7 3.5,-11 0,-9 -3.5,-11 -2.5,-7 -5.5,-4 -1.5,-4" transform="scale(0.5)"/>
      <polygon points="16,0 17.5,-4 21.5,-4 18.5,-7 19.5,-11 16,-9 12.5,-11 13.5,-7 10.5,-4 14.5,-4" transform="scale(0.5)"/>
    </g>
  </g>
  <text x="200" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#c8a45a" letter-spacing="3">BẢO VỆ KHÁCH SẠN</text>
  <text x="200" y="265" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#c8a45a" opacity="0.5" letter-spacing="2">RESORT - NHÀ HÀNG - KHÁCH SẠN</text>
  <line x1="92" y1="252" x2="148" y2="252" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <line x1="252" y1="252" x2="308" y2="252" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
</svg>