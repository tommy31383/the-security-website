<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#152848"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#tbg)" rx="8"/>
  <circle cx="200" cy="130" r="120" fill="#c8a45a" opacity="0.04"/>
  <!-- Dumbbell / training icon -->
  <g transform="translate(200,110)" stroke="#c8a45a" stroke-width="3" fill="none" opacity="0.6">
    <!-- Bar -->
    <line x1="-50" y1="0" x2="50" y2="0" stroke-width="4"/>
    <!-- Left weight -->
    <rect x="-65" y="-20" width="18" height="40" rx="3" fill="#c8a45a" opacity="0.2" stroke="#c8a45a"/>
    <rect x="-75" y="-15" width="12" height="30" rx="2" fill="#c8a45a" opacity="0.15" stroke="#c8a45a"/>
    <!-- Right weight -->
    <rect x="47" y="-20" width="18" height="40" rx="3" fill="#c8a45a" opacity="0.2" stroke="#c8a45a"/>
    <rect x="63" y="-15" width="12" height="30" rx="2" fill="#c8a45a" opacity="0.15" stroke="#c8a45a"/>
  </g>
  <!-- Target/crosshair -->
  <g transform="translate(200,110)" stroke="#c8a45a" stroke-width="1.5" fill="none" opacity="0.15">
    <circle cx="0" cy="0" r="55"/>
    <circle cx="0" cy="0" r="40"/>
    <circle cx="0" cy="0" r="25"/>
  </g>
  <!-- Running figure silhouette -->
  <g transform="translate(155,55)" fill="#c8a45a" opacity="0.2">
    <circle cx="20" cy="0" r="10"/>
    <path d="M15 12 L10 45 L0 70 L10 72 L18 50 L22 40 L26 50 L30 72 L40 70 L32 45 L28 12Z"/>
    <path d="M12 18 L-5 35 L0 38 L15 25Z"/>
    <path d="M28 18 L45 30 L42 35 L26 25Z"/>
  </g>
  <text x="200" y="245" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#c8a45a" letter-spacing="4">HUẤN LUYỆN</text>
  <text x="200" y="272" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#c8a45a" opacity="0.5" letter-spacing="2">CHUYÊN SÂU - BÀI BẢN</text>
  <line x1="110" y1="258" x2="160" y2="258" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="258" x2="290" y2="258" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
</svg>