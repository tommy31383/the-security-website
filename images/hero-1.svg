<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#132240"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c86a"/>
      <stop offset="100%" style="stop-color:#a8843a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c8a45a;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="600" fill="url(#bg1)"/>
  <ellipse cx="960" cy="300" rx="600" ry="300" fill="url(#glow1)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#c8a45a" stroke-width="1">
    <line x1="0" y1="100" x2="1920" y2="100"/><line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="300" x2="1920" y2="300"/><line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="0" y1="500" x2="1920" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/><line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/><line x1="1200" y1="0" x2="1200" y2="600"/>
    <line x1="1400" y1="0" x2="1400" y2="600"/><line x1="1600" y1="0" x2="1600" y2="600"/>
  </g>
  <!-- Shield icon -->
  <g transform="translate(960,220)" fill="url(#gold1)">
    <path d="M0-80 L60-50 L60 20 C60 60 30 90 0 110 C-30 90 -60 60 -60 20 L-60-50 Z" stroke="#c8a45a" stroke-width="2" fill="none"/>
    <path d="M0-60 L45-35 L45 15 C45 48 23 72 0 88 C-23 72 -45 48 -45 15 L-45-35 Z" fill="url(#gold1)" opacity="0.2"/>
    <!-- Checkmark inside shield -->
    <path d="M-20 10 L-5 25 L25-10" stroke="#c8a45a" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Security team silhouettes -->
  <g transform="translate(750,350)" fill="#c8a45a" opacity="0.3">
    <!-- Person 1 -->
    <circle cx="0" cy="0" r="18"/>
    <path d="M-20 25 L-25 90 L-5 90 L0 55 L5 90 L25 90 L20 25 Z"/>
    <!-- Person 2 (center, taller) -->
    <circle cx="80" cy="-10" r="20"/>
    <path d="M55 18 L50 100 L70 100 L80 60 L90 100 L110 100 L105 18 Z"/>
    <!-- Person 3 -->
    <circle cx="160" cy="0" r="18"/>
    <path d="M140 25 L135 90 L155 90 L160 55 L165 90 L185 90 L180 25 Z"/>
    <!-- Person 4 -->
    <circle cx="240" cy="5" r="17"/>
    <path d="M220 28 L215 88 L235 88 L240 55 L245 88 L265 88 L260 28 Z"/>
    <!-- Person 5 -->
    <circle cx="320" cy="0" r="18"/>
    <path d="M300 25 L295 90 L315 90 L320 55 L325 90 L345 90 L340 25 Z"/>
  </g>
  <!-- Text -->
  <text x="960" y="500" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="#c8a45a" letter-spacing="8">BẢO VỆ CHUYÊN NGHIỆP</text>
  <text x="960" y="545" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#c8a45a" opacity="0.6" letter-spacing="4">AN TOÀN - UY TIN - CHUYÊN NGHIỆP</text>
  <!-- Decorative lines -->
  <line x1="560" y1="515" x2="780" y2="515" stroke="#c8a45a" stroke-width="1" opacity="0.4"/>
  <line x1="1140" y1="515" x2="1360" y2="515" stroke="#c8a45a" stroke-width="1" opacity="0.4"/>
</svg>