<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="a6bg" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1628"/><stop offset="100%" style="stop-color:#1a3055"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#a6bg)" rx="8"/>
  <circle cx="250" cy="200" r="150" fill="#c8a45a" opacity="0.04"/>
  <!-- Fire extinguisher / emergency response -->
  <g transform="translate(200,90)" stroke="#c8a45a" stroke-width="2" fill="none">
    <!-- Extinguisher body -->
    <rect x="0" y="30" width="40" height="100" rx="8" fill="#c8a45a" opacity="0.1"/>
    <!-- Top -->
    <rect x="10" y="15" width="20" height="18" rx="3" fill="#c8a45a" opacity="0.12"/>
    <!-- Handle -->
    <path d="M12 15 L5 0 L35 0 L28 15" stroke-width="2.5"/>
    <!-- Nozzle -->
    <path d="M40 40 L65 30 L68 35 L42 48" stroke-width="2"/>
    <!-- Pressure gauge -->
    <circle cx="20" cy="55" r="8" opacity="0.4"/>
  </g>
  <!-- Warning triangle -->
  <g transform="translate(320,130)" stroke="#c8a45a" stroke-width="2.5" fill="none" opacity="0.3">
    <polygon points="0,-40 35,20 -35,20" fill="#c8a45a" opacity="0.08"/>
    <text x="0" y="12" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold" fill="#c8a45a" opacity="0.5" stroke="none">!</text>
  </g>
  <!-- Flame icon small -->
  <g transform="translate(150,250)" fill="#c8a45a" opacity="0.12">
    <path d="M0-30 C10-20 20 0 20 15 C20 30 10 40 0 40 C-10 40 -20 30 -20 15 C-20 0 -10-20 0-30Z"/>
    <path d="M0-15 C5-10 10 0 10 8 C10 16 5 22 0 22 C-5 22 -10 16 -10 8 C-10 0 -5-10 0-15Z" fill="#0a1628"/>
  </g>
  <text x="250" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#c8a45a" letter-spacing="3">PCCC - ỨNG CỨU</text>
  <text x="250" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#c8a45a" opacity="0.4" letter-spacing="2">ALBUM HOẠT ĐỘNG</text>
</svg>