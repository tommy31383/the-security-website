  </g>
  <text x="200" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#c8a45a" letter-spacing="3">XU HƯỚNG BẢO VỆ 2024</text>
  <text x="200" y="265" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#c8a45a" opacity="0.4" letter-spacing="2">TIN TỨC</text>
</svg>