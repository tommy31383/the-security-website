<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="n1bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/><stop offset="100%" style="stop-color:#1a3055"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#n1bg)" rx="8"/>
  <circle cx="200" cy="120" r="100" fill="#c8a45a" opacity="0.04"/>
  <!-- Newspaper / document icon -->
  <g transform="translate(200,100)" stroke="#c8a45a" stroke-width="2" fill="none">
    <rect x="-55" y="-60" width="110" height="140" rx="5" fill="#c8a45a" opacity="0.08"/>
    <!-- Header bar -->
    <rect x="-45" y="-50" width="90" height="12" rx="2" fill="#c8a45a" opacity="0.15"/>
    <!-- Text lines -->
    <g stroke-width="0" fill="#c8a45a" opacity="0.2">
      <rect x="-45" y="-30" width="60" height="4" rx="1"/>
      <rect x="-45" y="-20" width="90" height="3" rx="1"/>
      <rect x="-45" y="-12" width="85" height="3" rx="1"/>
      <rect x="-45" y="-4" width="70" height="3" rx="1"/>
      <rect x="-45" y="8" width="90" height="3" rx="1"/>
      <rect x="-45" y="16" width="80" height="3" rx="1"/>
      <rect x="-45" y="24" width="88" height="3" rx="1"/>
    </g>
    <!-- Image placeholder in article -->
    <rect x="15" y="-30" width="30" height="22" rx="2" fill="#c8a45a" opacity="0.1" stroke-width="1.5"/>
    <!-- Shield watermark -->
    <g transform="translate(0,55)" opacity="0.15">
      <path d="M0-12 L10-7 L10 3 C10 9 5 14 0 17 C-5 14 -10 9 -10 3 L-10-7Z" fill="#c8a45a" stroke="none"/>
