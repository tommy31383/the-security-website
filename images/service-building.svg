<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="sbg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/><stop offset="100%" style="stop-color:#152848"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sbg1)" rx="8"/>
  <circle cx="200" cy="120" r="110" fill="#c8a45a" opacity="0.04"/>
  <!-- Building -->
  <g transform="translate(200,50)" stroke="#c8a45a" fill="none">
    <!-- Main building -->
    <rect x="-50" y="20" width="100" height="130" stroke-width="2.5" fill="#c8a45a" opacity="0.1"/>
    <!-- Windows -->
    <g stroke-width="1.5" opacity="0.5">
      <rect x="-38" y="35" width="16" height="16" rx="1"/><rect x="-8" y="35" width="16" height="16" rx="1"/><rect x="22" y="35" width="16" height="16" rx="1"/>
      <rect x="-38" y="60" width="16" height="16" rx="1"/><rect x="-8" y="60" width="16" height="16" rx="1"/><rect x="22" y="60" width="16" height="16" rx="1"/>
      <rect x="-38" y="85" width="16" height="16" rx="1"/><rect x="-8" y="85" width="16" height="16" rx="1"/><rect x="22" y="85" width="16" height="16" rx="1"/>
      <rect x="-38" y="110" width="16" height="16" rx="1"/><rect x="-8" y="110" width="16" height="16" rx="1"/><rect x="22" y="110" width="16" height="16" rx="1"/>
    </g>
    <!-- Door -->
    <rect x="-12" y="125" width="24" height="25" rx="2" stroke-width="2" fill="#c8a45a" opacity="0.15"/>
    <!-- Roof antenna -->
    <line x1="0" y1="20" x2="0" y2="0" stroke-width="2"/>
    <line x1="-8" y1="8" x2="8" y2="8" stroke-width="1.5"/>
    <!-- Shield overlay -->
    <g transform="translate(0,70)" opacity="0.25">
      <path d="M0-35 L28-22 L28 8 C28 25 14 36 0 44 C-14 36 -28 25 -28 8 L-28-22Z" stroke="#c8a45a" stroke-width="2" fill="#c8a45a" opacity="0.1"/>
    </g>
  </g>
  <text x="200" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#c8a45a" letter-spacing="3">BẢO VỆ TÒA NHÀ</text>
  <text x="200" y="265" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#c8a45a" opacity="0.5" letter-spacing="2">CHUNG CƯ - VĂN PHÒNG</text>
  <line x1="100" y1="252" x2="155" y2="252" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <line x1="245" y1="252" x2="300" y2="252" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
