<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1e38"/><stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#fbg)" rx="8"/>
  <circle cx="200" cy="120" r="110" fill="#c8a45a" opacity="0.04"/>
  <!-- Factory -->
  <g transform="translate(110,50)" stroke="#c8a45a" fill="none" stroke-width="2">
    <!-- Main structure -->
    <rect x="0" y="70" width="180" height="90" fill="#c8a45a" opacity="0.1"/>
    <!-- Sawtooth roof -->
    <polygon points="0,70 0,30 60,70 60,30 120,70 120,30 180,70" fill="#c8a45a" opacity="0.08"/>
    <polyline points="0,70 0,30 60,70 60,30 120,70 120,30 180,70" stroke-width="2.5"/>
    <!-- Chimney -->
    <rect x="150" y="5" width="18" height="30" fill="#c8a45a" opacity="0.1" stroke-width="2"/>
    <!-- Smoke -->
    <g opacity="0.2" fill="none" stroke-width="1.5">
      <path d="M159 5 Q155-5 159-15 Q163-25 159-35"/>
      <path d="M165 5 Q169-8 165-18 Q161-28 165-38"/>
    </g>
    <!-- Windows -->
    <g stroke-width="1.5" opacity="0.5">
      <rect x="12" y="85" width="20" height="20" rx="1"/>
      <rect x="42" y="85" width="20" height="20" rx="1"/>
      <rect x="72" y="85" width="20" height="20" rx="1"/>
      <rect x="102" y="85" width="20" height="20" rx="1"/>
      <rect x="132" y="85" width="20" height="20" rx="1"/>
    </g>
    <!-- Door -->
    <rect x="75" y="125" width="30" height="35" rx="2" stroke-width="2" fill="#c8a45a" opacity="0.15"/>
    <!-- Gear icon overlay -->
    <g transform="translate(90,90)" opacity="0.15" fill="#c8a45a">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#c8a45a" stroke-width="3"/>
      <circle cx="0" cy="0" r="7" fill="none" stroke="#c8a45a" stroke-width="2"/>
      <g stroke="#c8a45a" stroke-width="4" stroke-linecap="round">
        <line x1="0" y1="-22" x2="0" y2="-15"/>
        <line x1="0" y1="15" x2="0" y2="22"/>
        <line x1="-22" y1="0" x2="-15" y2="0"/>
        <line x1="15" y1="0" x2="22" y2="0"/>
        <line x1="-15" y1="-15" x2="-11" y2="-11"/>
        <line x1="11" y1="11" x2="15" y2="15"/>
        <line x1="-15" y1="15" x2="-11" y2="11"/>
        <line x1="11" y1="-11" x2="15" y2="-15"/>
      </g>
    </g>
  </g>
  <text x="200" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#c8a45a" letter-spacing="3">BẢO VỆ NHÀ MÁY</text>
  <text x="200" y="265" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#c8a45a" opacity="0.5" letter-spacing="2">KHU CÔNG NGHIỆP - NHÀ XƯỞNG</text>
  <line x1="100" y1="252" x2="155" y2="252" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <line x1="245" y1="252" x2="300" y2="252" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
</svg>