<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="a3bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1628"/><stop offset="100%" style="stop-color:#1a3055"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#a3bg)" rx="8"/>
  <circle cx="250" cy="200" r="150" fill="#c8a45a" opacity="0.04"/>
  <!-- CCTV Camera -->
  <g transform="translate(250,160)" stroke="#c8a45a" stroke-width="2.5" fill="none">
    <!-- Mount -->
    <line x1="0" y1="-80" x2="0" y2="-40"/>
    <rect x="-15" y="-85" width="30" height="8" rx="2" fill="#c8a45a" opacity="0.15"/>
    <!-- Arm -->
    <line x1="0" y1="-40" x2="50" y2="-10"/>
    <!-- Camera body -->
    <rect x="30" y="-25" width="55" height="30" rx="5" fill="#c8a45a" opacity="0.1"/>
    <!-- Lens -->
    <circle cx="90" cy="-10" r="10" fill="#c8a45a" opacity="0.15"/>
    <circle cx="90" cy="-10" r="5" fill="#c8a45a" opacity="0.1"/>
    <!-- Vision cone -->
    <g opacity="0.08" fill="#c8a45a" stroke="none">
      <polygon points="100,-10 200,-80 200,60"/>
    </g>
    <!-- Signal waves -->
    <g opacity="0.2" stroke-width="1.5">
      <path d="M-10,-60 Q-25,-50 -10,-40" fill="none"/>
      <path d="M-18,-65 Q-38,-50 -18,-35" fill="none"/>
    </g>
  </g>
  <text x="250" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#c8a45a" letter-spacing="3">GIÁM SÁT AN NINH</text>
  <text x="250" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#c8a45a" opacity="0.4" letter-spacing="2">ALBUM HOẠT ĐỘNG</text>
</svg>