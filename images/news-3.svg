<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="n3bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1628"/><stop offset="100%" style="stop-color:#162a4a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#n3bg)" rx="8"/>
  <circle cx="200" cy="110" r="100" fill="#c8a45a" opacity="0.04"/>
  <!-- Graduation / certification -->
  <g transform="translate(200,90)" stroke="#c8a45a" stroke-width="2" fill="none">
    <!-- Graduation cap -->
    <polygon points="0,-40 60,-20 0,0 -60,-20" fill="#c8a45a" opacity="0.1" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="0" y2="-25" stroke-width="2"/>
    <rect x="-3" y="-28" width="6" height="6" rx="1" fill="#c8a45a" opacity="0.2"/>
    <!-- Tassel -->
    <path d="M60,-20 L60,-5 L55,-2" stroke-width="1.5" opacity="0.4"/>
    <circle cx="54" cy="0" r="3" fill="#c8a45a" opacity="0.2" stroke="none"/>
    <!-- Certificate below -->
    <g transform="translate(0,30)">
      <rect x="-45" y="0" width="90" height="60" rx="4" fill="#c8a45a" opacity="0.08"/>
      <!-- Lines -->
      <g stroke="none" fill="#c8a45a" opacity="0.15">
        <rect x="-30" y="10" width="60" height="4" rx="1"/>
        <rect x="-22" y="20" width="44" height="3" rx="1"/>
        <rect x="-25" y="28" width="50" height="3" rx="1"/>
      </g>
      <!-- Seal -->
      <circle cx="25" cy="45" r="8" fill="#c8a45a" opacity="0.12"/>
      <!-- Ribbon -->
      <g fill="#c8a45a" opacity="0.1" stroke="none">
        <path d="M20 53 L22 68 L25 62 L28 68 L30 53Z"/>
      </g>
    </g>
    <!-- Stars -->
    <g fill="#c8a45a" opacity="0.15" stroke="none" transform="translate(0,-55)">
      <polygon points="-20,0 -18.5,-4 -14.5,-4 -17,-7 -16,-11 -20,-8.5 -24,-11 -23,-7 -25.5,-4 -21.5,-4"/>
      <polygon points="0,-5 1.5,-9 5.5,-9 3,-12 4,-16 0,-13.5 -4,-16 -3,-12 -5.5,-9 -1.5,-9"/>
      <polygon points="20,0 21.5,-4 25.5,-4 23,-7 24,-11 20,-8.5 16,-11 17,-7 14.5,-4 18.5,-4"/>
    </g>
  </g>
  <text x="200" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#c8a45a" letter-spacing="3">ĐÀO TẠO NHÂN SỰ</text>
  <text x="200" y="265" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#c8a45a" opacity="0.4" letter-spacing="2">TIN TỨC</text>
</svg>